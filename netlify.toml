[build]
  command = "npm run build"
  publish = "dist"

# /projects and /team merged into homepage sections (July 2026)
[[redirects]]
  from = "/projects"
  to = "/#work"
  status = 301

[[redirects]]
  from = "/team"
  to = "/#team"
  status = 301

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
